<!DOCTYPE html>
<html>
<head>
    <title>Fashion Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 40px;
            background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') no-repeat center/cover;
            color: white;
        }

        .hero h1 {
            font-size: 40px;
        }

        .btn {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🔥 My Fashion Store</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h1>New Collection 2026 👕</h1>
    <p>Best Fashion for You 😎</p>
    <button class="btn">Shop Now</button>
</div>

<div class="products">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
        <h3>Jacket</h3>
        <p>₹1299</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1526178613658-3f1622045557">
        <h3>Shoes</h3>
        <p>₹999</p>
        <button class="btn">Buy Now</button>
    </div>
</div>

<footer>
    <p>© 2026 My Fashion Store</p>
</footer>

</body>
</html>
